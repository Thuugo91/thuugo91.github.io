<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="robots" content="noindex, nofollow">
<title>Eszközök · Kezdőlap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e1116; --card:#171c24; --card2:#1f2632; --line:#2a3340;
    --txt:#e6edf3; --dim:#8b97a7; --accent:#4aa8ff; --accent2:#ffb454; --good:#3fb950; --bad:#f85149;
  }
  [data-theme="light"]{
    --bg:#eceff4; --card:#ffffff; --card2:#f1f4f9; --line:#d6dde6;
    --txt:#1a2331; --dim:#5e6b7a; --accent:#2a7fde; --accent2:#d6841f; --good:#2da44e; --bad:#cf222e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{background:var(--bg)}
  body{font-family:'Montserrat',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:transparent;color:var(--txt);min-height:100vh;padding:18px}
  #bg-ov{position:fixed;inset:0;z-index:-1;background:linear-gradient(rgba(8,10,14,.5),rgba(8,10,14,.66))}
  [data-theme="light"] #bg-ov{background:linear-gradient(rgba(236,239,244,.42),rgba(236,239,244,.58))}
  .wrap{max-width:1180px;margin:0 auto}
  .top{display:flex;flex-wrap:wrap;align-items:center;gap:12px 20px;justify-content:space-between;
    background:rgba(18,22,29,.58);backdrop-filter:blur(9px) saturate(.92);-webkit-backdrop-filter:blur(9px) saturate(.92);
    border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:18px 26px;margin-bottom:16px}
  .top h1{font-size:30px;font-weight:800}
  [data-theme="light"] .top{background:rgba(255,255,255,.64);border-color:rgba(0,0,0,.07)}
  .nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .nav a{text-decoration:none;background:rgba(18,22,29,.58);border:1px solid rgba(255,255,255,.07);color:var(--txt);
    border-radius:12px;padding:9px 16px;font-weight:600;font-size:14px;backdrop-filter:blur(9px) saturate(.92);-webkit-backdrop-filter:blur(9px) saturate(.92)}
  .nav a:hover{border-color:var(--accent)}
  .nav a.on{border-color:var(--accent);color:var(--accent);background:rgba(74,168,255,.14)}
  [data-theme="light"] .nav a{background:rgba(255,255,255,.64);border-color:rgba(0,0,0,.07)}
  .card{background:rgba(18,22,29,.58);backdrop-filter:blur(9px) saturate(.92);-webkit-backdrop-filter:blur(9px) saturate(.92);
    border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:18px}
  [data-theme="light"] .card{background:rgba(255,255,255,.64);border-color:rgba(0,0,0,.07)}
  .card h2{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);
    margin-bottom:12px;font-weight:700;display:flex;align-items:center;gap:8px}
  .btn{background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:10px;
    padding:8px 12px;cursor:pointer;font-size:13px}
  .btn:hover{border-color:var(--accent)}
  .hint{color:var(--dim);font-size:12px;margin-top:8px}
  .foot{color:#3a4452;font-size:12px;text-align:center;margin-top:18px}
  .dc-in{width:100%;background:var(--card2);border:1px solid var(--line);color:var(--txt);
    border-radius:9px;padding:8px 10px;font-size:14px;margin:3px 0 9px;box-sizing:border-box}
  #dc-diff-out b,#dc-add-out b{color:var(--accent)}
</style>
</head>
<body>
<div id="bg-ov"></div>
<div class="wrap">

  <div class="top"><h1>🧰 Eszközök</h1></div>

  <nav class="nav">
    <a href="index.html">🏠 Kezdőlap</a>
    <a href="eszkozok.html" class="on">🧮 Eszközök</a>
  </nav>

  <div class="card" id="datecalc-card">
    <h2><span class="ttl">🧮 Dátumkalkulátor</span></h2>
    <div style="display:flex;gap:28px;flex-wrap:wrap">
      <div style="flex:1;min-width:270px">
        <div style="font-weight:600;margin-bottom:6px">Két dátum között eltelt idő</div>
        <label style="font-size:13px;color:var(--dim)">Kezdő dátum</label>
        <input type="date" id="dc-d1" class="dc-in">
        <label style="font-size:13px;color:var(--dim)">Vég dátum</label>
        <input type="date" id="dc-d2" class="dc-in">
        <button class="btn" id="dc-d2-today" style="padding:5px 11px">Vég = ma</button>
        <div id="dc-diff-out" style="margin-top:12px;font-size:14px;line-height:1.6"></div>
      </div>
      <div style="flex:1;min-width:270px">
        <div style="font-weight:600;margin-bottom:6px">Dátum ± időtartam</div>
        <label style="font-size:13px;color:var(--dim)">Alap dátum</label>
        <input type="date" id="dc-base" class="dc-in">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <select id="dc-dir" class="dc-in" style="width:auto;margin:3px 0"><option value="1">+ hozzáad</option><option value="-1">− kivon</option></select>
          <input type="number" id="dc-amt" class="dc-in" value="30" min="0" style="width:90px;margin:3px 0">
          <select id="dc-unit" class="dc-in" style="width:auto;margin:3px 0"><option value="d">nap</option><option value="w">hét</option><option value="m">hónap</option><option value="y">év</option></select>
        </div>
        <div id="dc-add-out" style="margin-top:12px;font-size:14px;line-height:1.6"></div>
      </div>
    </div>
    <div class="hint">A számítások a böngésződben futnak, semmi nem megy szerverre.</div>
  </div>

  <div class="foot">Kezdőlap · Marveen · Eszközök
    <button class="btn" id="theme-toggle" style="margin-left:12px;padding:6px 13px">🌙 Sötét</button></div>
</div>

<script>
const THEME_KEY='kezdolap_theme';
function applyTheme(t){document.documentElement.setAttribute('data-theme',t);
  document.getElementById('theme-toggle').textContent=(t==='light')?'🌙 Sötét':'☀️ Világos';}
let theme=localStorage.getItem(THEME_KEY)||'dark';applyTheme(theme);
document.getElementById('theme-toggle').onclick=()=>{theme=(theme==='dark')?'light':'dark';localStorage.setItem(THEME_KEY,theme);applyTheme(theme);};

/* ---- Dátumkalkulátor ---- */
(function(){
  const HUN=['vasárnap','hétfő','kedd','szerda','csütörtök','péntek','szombat'];
  const $=id=>document.getElementById(id);
  function pad2(n){return String(n).padStart(2,'0')}
  function fmt(d){return d.getFullYear()+'.'+pad2(d.getMonth()+1)+'.'+pad2(d.getDate())+'. ('+HUN[d.getDay()]+')';}
  function parse(v){if(!v)return null;const p=v.split('-');return new Date(+p[0],+p[1]-1,+p[2]);}
  function todayStr(){const d=new Date();return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());}
  function ymd(a,b){let y=b.getFullYear()-a.getFullYear(),m=b.getMonth()-a.getMonth(),d=b.getDate()-a.getDate();
    if(d<0){m--;const pm=new Date(b.getFullYear(),b.getMonth(),0).getDate();d+=pm;}
    if(m<0){m+=12;y--;}return{y,m,d};}
  function diff(){
    const a=parse($('dc-d1').value),b=parse($('dc-d2').value),out=$('dc-diff-out');
    if(!a||!b){out.innerHTML='<span style="color:var(--dim)">Adj meg két dátumot.</span>';return;}
    const days=Math.round((b-a)/86400000), abs=Math.abs(days);
    const lo=days<0?b:a, hi=days<0?a:b, r=ymd(lo,hi);
    const w=Math.floor(abs/7), wd=abs%7;
    let parts=[]; if(r.y)parts.push(r.y+' év'); if(r.m)parts.push(r.m+' hónap'); if(r.d||!parts.length)parts.push(r.d+' nap');
    out.innerHTML='Összesen: <b>'+abs+' nap</b>'+(days<0?' (a vég korábbi)':'')+
      '<br>= '+parts.join(', ')+
      '<br>= <b>'+w+'</b> hét '+wd+' nap'+
      (abs?'<br><span style="color:var(--dim)">'+(days>0?'a vég később van':'a vég előbb van')+'</span>':'<br><span style="color:var(--dim)">ugyanaz a nap</span>');
  }
  function addCalc(){
    const base=parse($('dc-base').value),out=$('dc-add-out');
    if(!base){out.innerHTML='<span style="color:var(--dim)">Adj meg egy alap dátumot.</span>';return;}
    const dir=+$('dc-dir').value, amt=Math.max(0,parseInt($('dc-amt').value||'0',10)), unit=$('dc-unit').value;
    const r=new Date(base.getTime()); const n=dir*amt;
    if(unit==='d')r.setDate(r.getDate()+n);
    else if(unit==='w')r.setDate(r.getDate()+n*7);
    else if(unit==='m')r.setMonth(r.getMonth()+n);
    else if(unit==='y')r.setFullYear(r.getFullYear()+n);
    out.innerHTML='Eredmény: <b>'+fmt(r)+'</b>';
  }
  $('dc-d1').value=todayStr(); $('dc-d2').value=todayStr(); $('dc-base').value=todayStr();
  ['dc-d1','dc-d2'].forEach(id=>$(id).addEventListener('input',diff));
  ['dc-base','dc-dir','dc-amt','dc-unit'].forEach(id=>$(id).addEventListener('input',addCalc));
  $('dc-d2-today').addEventListener('click',()=>{$('dc-d2').value=todayStr();diff();});
  diff(); addCalc();
})();
</script>
</body>
</html>
